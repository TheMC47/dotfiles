name:
    xmonad-private

dependencies:
    - base >= 4.7 && < 5
    - xmonad
    - xmonad-contrib
    - X11
    - xmobar
    - containers
    - flow
    - process
    - unix
    - split

library:
    source-dirs: src
    exposed-modules:
      - ColorScheme
      - Config

executables:
  xmonad-private:
    main:              xmonad.hs
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -Wall
    dependencies:
    - xmonad-private
